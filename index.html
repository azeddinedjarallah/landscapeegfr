<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EGFR-Mutant NSCLC Treatment Landscape</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 30px; }
  .card { background: #fff; border-radius: 16px; padding: 32px 36px 28px; box-shadow: 0 4px 30px rgba(0,0,0,0.09); max-width: 1350px; width: 100%; }
  h1 { font-size: 19px; color: #1a2e44; font-weight: 700; margin-bottom: 5px; line-height: 1.4; }
  .sub { font-size: 13px; color: #6b7a8d; margin-bottom: 6px; }
  .hint { font-size: 12px; color: #9aa5b4; margin-bottom: 18px; }
  canvas { display: block; width: 100%; cursor: default; }
  #tooltip {
    display: none; position: fixed; background: rgba(20,30,48,0.93); color: #fff;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-width: 260px; line-height: 1.6; z-index: 999;
  }
  .footer { margin-top: 14px; font-size: 11px; color: #9aa5b4; text-align: right; }
</style>
</head>
<body>
<div class="card">
  <h1>EGFR-Mutant NSCLC: Treatment Landscape</h1>
  <p class="sub">Number of patients per treatment and therapeutic category &nbsp;|&nbsp; All treatment lines included</p>
  <p class="hint">💡 Click on a treatment in the legend to show/hide it from the chart</p>
  <canvas id="c"></canvas>
  <p class="footer">* Null values excluded &nbsp;|&nbsp; A patient may appear in multiple categories</p>
</div>
<div id="tooltip"></div>
<script>
const CATS = ['Thérapie\nciblée','Chimio-\nthérapie','Antiangio-\ngénique','AC\nbispécifique','Immuno-\nthérapie','ADC'];
const CATS_FULL = ['Thérapie ciblée','Chimiothérapie','Antiangiogénique','AC bispécifique','Immunothérapie','ADC'];
const SEGS = [
  {ci:0,label:'osimertinib',val:762,color:'#1565C0'},
  {ci:0,label:'erlotinib',val:76,color:'#1E88E5'},
  {ci:0,label:'afatinib',val:60,color:'#42A5F5'},
  {ci:0,label:'gefitinib',val:55,color:'#64B5F6'},
  {ci:0,label:'lazertinib',val:16,color:'#90CAF9'},
  {ci:0,label:'Autre (TC)',val:15,color:'#BBDEFB'},
  {ci:0,label:'mobocertinib',val:11,color:'#7EB9DD'},
  {ci:0,label:'crizotinib',val:8,color:'#A2CCE8'},
  {ci:0,label:'sunvozertinib',val:5,color:'#BAD9F2'},
  {ci:0,label:'furmonertinib',val:4,color:'#CAE4F5'},
  {ci:0,label:'selpercatinib',val:3,color:'#D8EDF8'},
  {ci:0,label:'sotorasib',val:2,color:'#E4F3FB'},
  {ci:0,label:'lorlatinib',val:2,color:'#C5E0F5'},
  {ci:0,label:'capmatinib',val:1,color:'#D0E8F7'},
  {ci:0,label:'ceralasertib',val:1,color:'#DAEEFB'},
  {ci:0,label:'adagrasib',val:1,color:'#E2F2FC'},
  {ci:1,label:'carboplatine',val:387,color:'#C62828'},
  {ci:1,label:'pemetrexed',val:369,color:'#EF5350'},
  {ci:1,label:'paclitaxel',val:124,color:'#E57373'},
  {ci:1,label:'cisplatine',val:64,color:'#EF9A9A'},
  {ci:1,label:'gemcitabine',val:35,color:'#FF7043'},
  {ci:1,label:'docetaxel',val:24,color:'#FF8A65'},
  {ci:1,label:'etoposide',val:23,color:'#FFA726'},
  {ci:1,label:'vinorelbine',val:14,color:'#FFB74D'},
  {ci:1,label:'lurbinectidine',val:4,color:'#FFCA28'},
  {ci:1,label:'Autre (Chimio)',val:3,color:'#FFD54F'},
  {ci:1,label:'topotecan',val:3,color:'#FFE082'},
  {ci:1,label:'cav',val:1,color:'#FFF3CD'},
  {ci:2,label:'bevacizumab',val:101,color:'#00897B'},
  {ci:2,label:'cabozantinib',val:2,color:'#80CBC4'},
  {ci:3,label:'amivantamab',val:84,color:'#8E24AA'},
  {ci:3,label:'Autre (AC)',val:2,color:'#CE93D8'},
  {ci:4,label:'pembrolizumab',val:92,color:'#2E7D32'},
  {ci:4,label:'nivolumab',val:23,color:'#43A047'},
  {ci:4,label:'atezolizumab',val:11,color:'#66BB6A'},
  {ci:4,label:'durvalumab',val:7,color:'#81C784'},
  {ci:4,label:'Autre (Immuno)',val:4,color:'#A5D6A7'},
  {ci:4,label:'ipilimumab',val:2,color:'#C8E6C9'},
  {ci:4,label:'cemiplimab',val:1,color:'#DCEDC8'},
  {ci:5,label:'Datopotamab, Deruxtecan',val:9,color:'#AD1457'},
  {ci:5,label:'Autre (ADC)',val:7,color:'#E91E63'},
  {ci:5,label:'Deruxtecan, Patritumab',val:4,color:'#F06292'},
  {ci:5,label:'Sacituzumab, tirumotecan',val:2,color:'#F48FB1'},
  {ci:5,label:'Sacituzumab, govitecan',val:1,color:'#F8BBD0'},
  {ci:5,label:'Deruxtecan, Trastuzumab',val:1,color:'#FCE4EC'},
  {ci:5,label:'Telisotuzumab, Vedotin',val:1,color:'#FF80AB'},
  {ci:5,label:'Vedotin',val:1,color:'#FFBCD9'},
];

const hidden = new Set(); // labels des traitements masqués
const W=1280, H=720, M={top:50,right:345,bottom:85,left:72};
const cW=W-M.left-M.right, cH=H-M.top-M.bottom;
const MAX_V=1150, scaleY=cH/MAX_V, BAR_W=(cW/6)*0.62;
const canvas=document.getElementById('c');
canvas.width=W; canvas.height=H;
const ctx=canvas.getContext('2d');
let hitRects=[], legendHits=[];

function barX(ci){ return M.left + ci*(cW/6) + ((cW/6)-BAR_W)/2; }

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Gridlines + Y labels
  [0,200,400,600,800,1000].forEach(v=>{
    const gy=M.top+cH-v*scaleY;
    ctx.strokeStyle=v===0?'#aab':'#e4e9f0'; ctx.lineWidth=v===0?1.5:1;
    ctx.beginPath(); ctx.moveTo(M.left,gy); ctx.lineTo(M.left+cW,gy); ctx.stroke();
    ctx.fillStyle='#5a6272'; ctx.font='12px Segoe UI'; ctx.textAlign='right';
    ctx.fillText(v, M.left-8, gy+4);
  });

  // Bars
  hitRects=[];
  for(let ci=0;ci<6;ci++){
    const segs = SEGS.filter(s => s.ci===ci && !hidden.has(s.label));
    const bx = barX(ci);
    let cumY = M.top+cH;
    let visTotal = segs.reduce((s,r)=>s+r.val,0);

    segs.forEach(seg=>{
      const sh=Math.max(seg.val*scaleY,2), sy=cumY-sh;
      ctx.fillStyle=seg.color;
      ctx.fillRect(bx,sy,BAR_W,sh);
      ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=0.6;
      ctx.strokeRect(bx,sy,BAR_W,sh);
      hitRects.push({x:bx,y:sy,w:BAR_W,h:sh,label:seg.label,val:seg.val,ci,visTotal});
      cumY=sy;
    });

    // n= au dessus de la barre
    if(visTotal>0){
      const totalH=visTotal*scaleY;
      ctx.fillStyle='#1a2e44'; ctx.font='bold 12px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('n='+visTotal, bx+BAR_W/2, M.top+cH-totalH-7);
    }

    // Label X
    ctx.fillStyle='#2c3e50'; ctx.font='bold 13px Segoe UI'; ctx.textAlign='center';
    CATS[ci].split('\n').forEach((line,i)=>
      ctx.fillText(line, bx+BAR_W/2, M.top+cH+22+i*16));
  }

  // Y-axis title
  ctx.save();
  ctx.translate(18, M.top+cH/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.font='bold 13px Segoe UI'; ctx.fillStyle='#2c3e50';
  ctx.fillText('Number of patients',0,0);
  ctx.restore();

  // Légende cliquable
  legendHits=[];
  const lx=M.left+cW+22; let ly=M.top;
  const catColors=['#1565C0','#C62828','#00897B','#8E24AA','#2E7D32','#AD1457'];
  for(let ci=0;ci<6;ci++){
    ctx.fillStyle=catColors[ci]; ctx.font='bold 11px Segoe UI'; ctx.textAlign='left';
    ctx.fillText(CATS_FULL[ci].toUpperCase(), lx, ly); ly+=14;
    SEGS.filter(s=>s.ci===ci).forEach(seg=>{
      const isHidden=hidden.has(seg.label);
      // Carré couleur (grisé si masqué)
      ctx.fillStyle=isHidden?'#d1d5db':seg.color;
      ctx.fillRect(lx, ly-9, 11, 11);
      ctx.strokeStyle='#bbb'; ctx.lineWidth=0.5;
      ctx.strokeRect(lx, ly-9, 11, 11);
      // Texte (barré si masqué)
      ctx.fillStyle=isHidden?'#aab':'#374151';
      ctx.font=(isHidden?'italic ':'')+'10.5px Segoe UI';
      ctx.fillText(seg.label+' ('+seg.val+')', lx+15, ly);
      if(isHidden){
        // trait barré
        const tw=ctx.measureText(seg.label+' ('+seg.val+')').width;
        ctx.strokeStyle='#999'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(lx+15,ly-4); ctx.lineTo(lx+15+tw,ly-4); ctx.stroke();
      }
      // Zone cliquable
      legendHits.push({x:lx, y:ly-11, w:210, h:14, label:seg.label});
      ly+=13;
    });
    ly+=6;
  }
}

draw();

// Tooltip
const tip=document.getElementById('tooltip');
function getCanvasCoords(e){
  const r=canvas.getBoundingClientRect();
  return {mx:(e.clientX-r.left)*W/r.width, my:(e.clientY-r.top)*H/r.height};
}

canvas.addEventListener('mousemove', e=>{
  const {mx,my}=getCanvasCoords(e);
  // Survol légende → pointer
  const overLegend=legendHits.some(h=>mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h);
  canvas.style.cursor=overLegend?'pointer':'default';
  tip.style.display='none';
  if(!overLegend){
    // Survol barre → tooltip
    const found=hitRects.find(r2=>mx>=r2.x&&mx<=r2.x+r2.w&&my>=r2.y&&my<=r2.y+r2.h);
    if(found){
      const pct=((found.val/found.visTotal)*100).toFixed(1);
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-45)+'px';
      tip.innerHTML='<b>'+CATS_FULL[found.ci]+'</b><br><b>'+found.label+'</b><br>'+
        found.val+' patient'+(found.val>1?'s':'')+' — '+pct+'% (visible)';
    }
  }
});

canvas.addEventListener('click', e=>{
  const {mx,my}=getCanvasCoords(e);
  const hit=legendHits.find(h=>mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h);
  if(hit){
    if(hidden.has(hit.label)) hidden.delete(hit.label);
    else hidden.add(hit.label);
    draw();
  }
});

canvas.addEventListener('mouseleave',()=>{
  tip.style.display='none';
  canvas.style.cursor='default';
});
</script>
</body>
</html>
